# Test Configuration - Uses H2 Database
# This file is automatically used when running tests
# It overrides application.properties for test context

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging tests if needed)
spring.h2.console.enabled=false

# Disable Flyway - we'll create tables via schema.sql for tests
spring.flyway.enabled=false

# Enable schema.sql auto-loading (Spring Boot will execute this on startup)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

# MyBatis configuration
mybatis.configuration.cache-enabled=false
mybatis.configuration.default-statement-timeout=3000
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=io.spring.infrastructure.mybatis
mybatis.mapper-locations=mapper/*.xml

# Application properties
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true
image.default=https://static.productionready.io/images/smiley-cyrus.jpg
jwt.secret=nRvyYC4soFxBdZ-F-5Nnzz5USXstR1YylsTd-mA0aKtI9HUlriGrtkf-TiuDapkLiUCogO3JOK7kwZisrHp6wA
jwt.sessionTime=86400

# Servlet context path
server.servlet.context-path=/api

# Logging
logging.level.io.spring.infrastructure.mybatis=INFO
logging.level.io.spring=INFO

